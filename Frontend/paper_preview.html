<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Paper Preview - Vitly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f5f5f7;
            --sidebar-bg: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #0071e3;
            --border-radius: 16px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --border-color: #d2d2d7;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        button, a, img, .btn, .hamburger, .back-link, .download-btn {
            user-select: none;
            -webkit-user-drag: none;
        }
        :focus { outline: none; }
        :focus-visible { outline: 2px solid #0177ED; outline-offset: 2px; }
        html, body {
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }
        body {
            background: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        .spinner {
            width: 20px;
            height: 20px;
            position: relative;
        }
        .spinner div {
            position: absolute;
            width: 3px;
            height: 10px;
            background: #fff;
            border-radius: 10px;
            top: 2px;
            left: 15px;
            transform-origin: center 16px;
            animation: fade 1.2s linear infinite;
        }
        .spinner div:nth-child(1) { transform: rotate(0deg); animation-delay: -1.1s; }
        .spinner div:nth-child(2) { transform: rotate(30deg); animation-delay: -1s; }
        .spinner div:nth-child(3) { transform: rotate(60deg); animation-delay: -0.9s; }
        .spinner div:nth-child(4) { transform: rotate(90deg); animation-delay: -0.8s; }
        .spinner div:nth-child(5) { transform: rotate(120deg); animation-delay: -0.7s; }
        .spinner div:nth-child(6) { transform: rotate(150deg); animation-delay: -0.6s; }
        .spinner div:nth-child(7) { transform: rotate(180deg); animation-delay: -0.5s; }
        .spinner div:nth-child(8) { transform: rotate(210deg); animation-delay: -0.4s; }
        .spinner div:nth-child(9) { transform: rotate(240deg); animation-delay: -0.3s; }
        .spinner div:nth-child(10) { transform: rotate(270deg); animation-delay: -0.2s; }
        .spinner div:nth-child(11) { transform: rotate(300deg); animation-delay: -0.1s; }
        .spinner div:nth-child(12) { transform: rotate(330deg); animation-delay: 0s; }
        @keyframes fade {
            0% { opacity: 1; }
            100% { opacity: 0.15; }
        }
        .hide {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }
        .navbar {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 50px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.312);
            backdrop-filter: blur(20px);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }
        .navbar button {
            background-color: transparent;
            border: none;
            color: rgb(87, 87, 87);
            cursor: pointer;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-weight: 350;
            font-size: 13px;
        }
        .logout {
            padding: 10px 20px;
            color: white !important;
            background-color: #000000 !important;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            transition: all 0.3s ease-in-out;
            cursor: pointer;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-weight: 500 !important;
        }
        .logout:hover {
            background-color: #ff0000 !important;
        }
        .hamburger {
            display: none;
            background: transparent;
            border: none;
            cursor: pointer;
            color: #333;
            z-index: 10;
            align-items: center;
            justify-content: center;
        }
        .mobile-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 20px;
        }
        .mobile-menu-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .mobile-menu-overlay button {
            background: transparent;
            border: none;
            font-size: 20px;
            font-weight: 500;
            color: #333;
            cursor: pointer;
        }
        .mobile-menu-overlay .close-menu {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
        }
        .elite-nav-btn {
            background: none !important;
            border: none !important;
            padding: 5px 10px !important;
            display: inline-flex !important;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            transition: transform 0.2s;
            overflow: visible !important;
        }
        .elite-nav-btn:hover {
            transform: scale(1.05);
        }
        .elite-logo-stack {
            position: relative;
            width: 65px;
            height: 35px;
            transform-style: preserve-3d;
        }
        .elite-logo-stack img {
            position: absolute !important;
            top: 0;
            left: 0;
            width: 100% !important;
            height: auto !important;
            transform: none !important;
            transition: none !important;
        }
        .elite-logo-stack .bg-image { z-index: 1; }
        .elite-logo-stack .top { z-index: 2; }
        @keyframes miniFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        .elite-logo-stack .floating {
            animation: miniFloat 2s ease-in-out infinite !important;
        }
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 100px 32px 32px 32px;
            overflow: hidden;
        }
        .page-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1300px;
            height: 100%;
            gap: 20px;
        }
        .paper-info-bar {
            background: white;
            padding: 16px 24px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(0, 0, 0, 0.05);
            flex-shrink: 0;
        }
        .info-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: #f5f5f7;
            border-radius: 50%;
            color: var(--text-primary);
            text-decoration: none;
            transition: all 0.2s;
        }
        .back-link:hover {
            background: #000;
            color: #fff;
        }
        .info-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .exam-tag {
            background: #eef2ff;
            color: #4f46e5;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }
        .download-btn {
            background: #000;
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }
        .download-btn:hover {
            background: #333;
            transform: translateY(-1px);
        }
        .pdf-section {
            flex: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .pdf-container {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        @media (max-width: 768px) {
            #loader {
                background: rgba(255, 255, 255, 0.7);
                backdrop-filter: blur(20px);
            }
            .spinner div {
                background: #333;
            }
            .navbar {
                width: calc(100% - 40px);
                max-width: 450px;
                left: 50%;
                transform: translateX(-50%);
                top: 15px;
                border-radius: 50px;
                height: 60px;
                padding: 0 25px;
                justify-content: space-between;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
                border: 1px solid #fff;
                background: rgba(255, 255, 255, 0.8);
                backdrop-filter: blur(20px);
            }
            .navbar img {
                position: relative !important;
                left: 0 !important;
                top: 0 !important;
                transform: none !important;
                width: 50px;
            }
            .navbar button:not(.hamburger) {
                display: none !important;
            }
            .hamburger {
                display: flex;
            }
            .mobile-menu-overlay {
                top: 85px;
                right: 32px;
                left: auto;
                width: 260px;
                height: auto;
                background: rgba(255, 255, 255, 0.7);
                backdrop-filter: blur(40px);
                align-items: flex-start;
                transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                gap: 12px;
                padding: 25px 20px;
                border-radius: 25px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.1);
                border: 1px solid #fff;
                transform: translateY(-20px) scale(0.95);
            }
            .mobile-menu-overlay.active {
                transform: translateY(0) scale(1);
            }
            .mobile-menu-overlay button {
                font-size: 15px;
                white-space: nowrap;
                width: 100%;
                text-align: left;
                padding: 10px 0;
                color: #333;
                border-bottom: 1px solid rgba(0,0,0,0.05);
            }
            .mobile-menu-overlay button:last-of-type {
                border-bottom: none;
            }
            .mobile-menu-overlay .elite-nav-btn {
                padding: 10px 0 !important;
            }
            .mobile-menu-overlay button.logout {
                margin-top: 10px;
                color: #ff3b30 !important;
                background: rgba(255, 59, 48, 0.08) !important;
                padding: 14px 20px !important;
                border-radius: 14px !important;
                text-align: center !important;
                font-weight: 600 !important;
                border-bottom: none;
            }
            .mobile-menu-overlay .close-menu {
                display: none;
            }
            main {
                padding: 100px 16px 24px 16px;
                overflow-y: auto;
                height: 100vh;
                display: block;
            }
            .page-container {
                height: auto;
                gap: 12px;
            }
            .paper-info-bar {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
                padding: 18px;
                width: 100%;
            }
            .info-left {
                flex-wrap: wrap;
                gap: 10px;
                width: 100%;
            }
            .info-value {
                font-size: 14px;
            }
            .exam-tag {
                font-size: 11px;
                padding: 3px 10px;
            }
            .download-btn {
                width: 100%;
                justify-content: center;
                padding: 14px;
            }
            .pdf-section {
                height: 600px;
                min-height: 500px;
                flex: none;
                margin-top: 10px;
            }
            .mobile-pdf-fallback {
                height: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 20px;
                padding: 20px;
                text-align: center;
                background: #1c1c1e;
                color: white;
                border-radius: var(--border-radius);
            }
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner">
            <div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div>
        </div>
    </div>
    <nav class="navbar">
        <img src="../images/vitly-new-logo.png" alt="" width="50" onclick="window.location.href='/dashboard'"
            style="position: absolute; left: 40px; top: 50%; transform: translateY(-50%); cursor: pointer;">
        <button class="hamburger" onclick="toggleMobileMenu()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <button onclick="window.location.href='/dashboard'">Home</button>
        <button class="elite-nav-btn" onclick="window.location.href='/elite'">
            <div class="elite-logo-stack">
                <img src="../images/ELITE.png" alt="" class="top">
                <img src="../images/VITL.png" alt="" class="bg-image">
                <img src="../images/FLASHLOGO.png" alt="" class="top floating">
            </div>
        </button>
        <button onclick="window.location.href='/cgpa_Calc'">CGPA Calculator</button>
        <button onclick="window.location.href='/papers'" style="color: #0071e3; font-weight: 600;">Previous Year Papers</button>
        <button onclick="window.location.href='/FFCS'">FFCS Planner</button>
        <button onclick="window.location.href='/profile'">Profile</button>
        <button class="logout" onclick="logout()">Logout</button>
    </nav>
    <main>
        <div class="page-container">
            <header class="paper-info-bar">
                <div class="info-left">
                    <a href="/papers" class="back-link" title="Back to Papers">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    </a>
                    <span class="info-value" id="display-courseCode">...</span>
                    <span class="info-value" id="display-subject">...</span>
                    <span class="exam-tag" id="display-examType">...</span>
                    <span class="info-value" id="display-year-slot">...</span>
                </div>
                <a href="#" class="download-btn" id="download-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Download
                </a>
            </header>
            <section class="pdf-section">
                <div class="pdf-container">
                    <iframe id="pdf-viewer" src="" title="Question Paper"></iframe>
                </div>
            </section>
        </div>
    </main>
    <script>
        function getQueryParams() {
            const params = {};
            const search = window.location.search.substring(1);
            if (search) {
                search.split('&').forEach(param => {
                    const [key, value] = param.split('=');
                    params[key] = decodeURIComponent(value);
                });
            }
            return params;
        }
        async function init() {
            const params = getQueryParams();
            if (params.courseCode) document.getElementById('display-courseCode').textContent = params.courseCode;
            if (params.examType) document.getElementById('display-examType').textContent = params.examType;
            if (params.subject) document.getElementById('display-subject').textContent = params.subject;
            if (params.year && params.slot) {
                document.getElementById('display-year-slot').textContent = `${params.year} • ${params.slot}`;
            }
            if (params.courseCode && params.slot && params.year && params.examType) {
                try {
                    const queryString = `courseCode=${encodeURIComponent(params.courseCode)}&slot=${encodeURIComponent(params.slot)}&year=${encodeURIComponent(params.year)}&examType=${encodeURIComponent(params.examType)}`;
                    const response = await fetch(`/api/paper-details?${queryString}`);
                    const data = await response.json();
                    if (data.fileUrl && data.fileUrl !== "#") {
                        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                        const pdfViewer = document.getElementById('pdf-viewer');
                        if (isMobile) {
                            pdfViewer.style.display = 'none';
                            const fallback = document.createElement('div');
                            fallback.className = 'mobile-pdf-fallback';
                            fallback.innerHTML = `
                                <div style="font-size: 48px; margin-bottom: 10px;">📄</div>
                                <h3 style="margin: 0; font-size: 18px;">PDF Preview</h3>
                                <p style="font-size: 14px; opacity: 0.7; margin: 0 0 10px 0;">Embedding PDFs is restricted on mobile browsers.</p>
                                <a href="${data.fileUrl}" target="_blank" style="padding: 12px 24px; background: #0071e3; color: white; text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 15px;">Open in New Tab</a>
                            `;
                            pdfViewer.parentElement.appendChild(fallback);
                        } else {
                            pdfViewer.src = data.fileUrl;
                        }
                        document.getElementById('download-btn').href = data.fileUrl;
                        document.getElementById('download-btn').setAttribute('download', `${params.courseCode}_${params.examType}.pdf`);
                    }
                } catch (error) {
                    console.error("Error fetching paper details:", error);
                } finally {
                    document.getElementById('loader').classList.add('hide');
                }
            } else {
                document.getElementById('loader').classList.add('hide');
            }
        }
        function logout() {
            const modalHTML = `
            <div id="logoutModalOverlay" class="modal-overlay active" style="position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 9999; background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); opacity: 0; transition: opacity 0.3s ease;">
                <div class="modal-card" style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); text-align: center; width: 90%; max-width: 400px; transform: scale(0.9); transition: transform 0.3s ease;">
                    <h2 style="color: #333; margin-bottom: 10px;">Confirm Logout</h2>
                    <p style="color: #666; font-size: 15px; margin-bottom: 30px;">Are you sure you want to log out of VITly?</p>
                    <div style="display: flex; gap: 15px; justify-content: center;">
                        <button onclick="document.getElementById('logoutModalOverlay').remove()" style="padding: 12px 25px; border-radius: 30px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: #f1f1f1; color: #333;">Cancel</button>
                        <button onclick="window.location.href='/logout'" style="padding: 12px 25px; border-radius: 30px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: #ff3b30; color: white;">Yes, Logout</button>
                    </div>
                </div>
            </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            setTimeout(() => {
                const overlay = document.getElementById('logoutModalOverlay');
                if (overlay) {
                    overlay.style.opacity = '1';
                    overlay.querySelector('.modal-card').style.transform = 'scale(1)';
                }
            }, 10);
        }
        function toggleMobileMenu() {
            let menu = document.getElementById('mobileMenuOverlay');
            if (!menu) {
                menu = document.createElement('div');
                menu.id = 'mobileMenuOverlay';
                menu.className = 'mobile-menu-overlay';
                let navButtons = Array.from(document.querySelectorAll('.navbar button:not(.hamburger)')).map(btn => {
                    return btn.outerHTML.replace('onclick="', 'onclick="toggleMobileMenu(); ');
                }).join('');
                menu.innerHTML = `
                    <button class="close-menu" onclick="toggleMobileMenu()">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                    ${navButtons}
                `;
                document.body.appendChild(menu);
                void menu.offsetWidth;
            }
            menu.classList.toggle('active');
        }
        window.onload = init;
    </script>
</body>
</html>
