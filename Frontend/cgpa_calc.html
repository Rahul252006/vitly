<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIT CGPA Calculator - Fast Accurate GPA Tool | Vitly</title>
    <meta name="description"
        content="Vitly helps VIT students with CGPA calculator, FFCS planner, previous year papers, attendance tools and student resources.">
    <link rel="icon" type="image/png" href="../images/mainlogo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #F5F5F7;
            overflow-x: hidden;
        }

        /* Fullscreen Loader */
        #loader {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        .spinner {
            width: 20px;
            height: 20px;
            position: relative;
        }

        .spinner div {
            position: absolute;
            width: 3px;
            height: 10px;
            background: #111;
            border-radius: 10px;
            top: 2px;
            left: 15px;
            transform-origin: center 16px;
            animation: fade 1.2s linear infinite;
        }

        .spinner div:nth-child(1) {
            transform: rotate(0deg);
            animation-delay: -1.1s;
        }

        .spinner div:nth-child(2) {
            transform: rotate(30deg);
            animation-delay: -1s;
        }

        .spinner div:nth-child(3) {
            transform: rotate(60deg);
            animation-delay: -0.9s;
        }

        .spinner div:nth-child(4) {
            transform: rotate(90deg);
            animation-delay: -0.8s;
        }

        .spinner div:nth-child(5) {
            transform: rotate(120deg);
            animation-delay: -0.7s;
        }

        .spinner div:nth-child(6) {
            transform: rotate(150deg);
            animation-delay: -0.6s;
        }

        .spinner div:nth-child(7) {
            transform: rotate(180deg);
            animation-delay: -0.5s;
        }

        .spinner div:nth-child(8) {
            transform: rotate(210deg);
            animation-delay: -0.4s;
        }

        .spinner div:nth-child(9) {
            transform: rotate(240deg);
            animation-delay: -0.3s;
        }

        .spinner div:nth-child(10) {
            transform: rotate(270deg);
            animation-delay: -0.2s;
        }

        .spinner div:nth-child(11) {
            transform: rotate(300deg);
            animation-delay: -0.1s;
        }

        .spinner div:nth-child(12) {
            transform: rotate(330deg);
            animation-delay: 0s;
        }

        @keyframes fade {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0.15;
            }
        }

        .navbar {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 50px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.312);
            backdrop-filter: blur(20px);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        .navbar button {
            background-color: transparent;
            border: none;
            color: rgb(87, 87, 87);
            cursor: pointer;
            font-size: 13px;
            font-weight: 350;
        }

        .logout {
            padding: 10px 20px;
            color: white !important;
            background-color: #000000 !important;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            transition: all 0.3s ease-in-out;
            cursor: pointer;
            font-weight: 500 !important;
        }

        .logout:hover {
            background-color: #ff0000 !important;
        }

        .main-wrapper {
            margin-top: 100px;
            padding: 0 40px 60px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: filter 0.4s ease;
            width: 100%;
        }

        .blur-bg {
            filter: blur(6px);
            pointer-events: none;
        }

        h1.title {
            font-size: 40px;
            text-align: center;
            margin-bottom: 25px;
        }

        /* Calculator UI Customization */
        .calc-box {
            background: white;
            padding: 30px 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 900px;
            animation: fadeUp 0.6s ease forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Toggle mechanism */
        .toggle-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            background: #f1f1f1;
            padding: 5px;
            border-radius: 40px;
            width: max-content;
            margin: 0 auto 30px auto;
        }

        .toggle-btn {
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            color: #555;
            background: transparent;
        }

        .toggle-btn.active {
            background: #0177ED;
            color: white;
            box-shadow: 0 4px 12px rgba(1, 119, 237, 0.3);
        }

        .calc-section {
            display: none;
        }

        .calc-section.active {
            display: block;
            animation: fadeUp 0.4s ease forwards;
        }

        /* Inputs configuration */
        .headers-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 0.5fr;
            gap: 15px;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 13px;
            color: #666;
            padding: 0 5px;
        }

        .dynamic-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 0.5fr;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
        }

        .cgpa-headers-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 0.5fr;
            gap: 15px;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 13px;
            color: #666;
            padding: 0 5px;
        }

        .cgpa-dynamic-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 0.5fr;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
        }

        .form-control {
            padding: 12px 15px;
            border: 1px solid #dcdcdc;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            width: 100%;
        }

        .form-control:focus {
            border-color: #0177ED;
            box-shadow: 0 0 0 2px rgba(1, 119, 237, 0.1);
        }

        select.form-control {
            cursor: pointer;
            appearance: none;
            background: url('data:image/svg+xml;utf8,<svg fill="black" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>') no-repeat right 10px center;
            background-size: 18px;
        }

        /* Actions */
        .row-action {
            background: transparent;
            border: none;
            color: #ff3b30;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .row-action:hover {
            color: #cc2f26;
            transform: scale(1.1);
        }

        .buttons-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 25px;
        }

        .btn {
            padding: 14px 30px;
            border-radius: 40px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            border: none;
            font-weight: 500;
        }

        .btn-add {
            background: #eef5ff;
            color: #0177ED;
        }

        .btn-add:hover {
            background: #dceafc;
        }

        .btn-calc {
            background: #0177ED;
            color: white;
            box-shadow: 0 4px 15px rgba(1, 119, 237, 0.3);
        }

        .btn-calc:hover {
            background: #006bce;
            transform: translateY(-2px);
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            text-align: center;
            width: 90%;
            max-width: 400px;
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        .cgpa_active {
            color: #0177ED !important;
            font-weight: 600 !important;
        }

        .modal-score {
            font-size: 64px;
            font-weight: 800;
            color: #0177ED;
            margin: 10px 0;
        }

        .modal-subtitle {
            color: #666;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .btn-close {
            background: #f1f1f1;
            color: #333;
            padding: 12px 30px;
            width: 100%;
            font-size: 15px;
            margin-top: 10px;
        }

        .btn-close:hover {
            background: #e4e4e4;
        }

        .hide {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }
        .hamburger { display: none; background: transparent; border: none; font-size: 28px; cursor: pointer; color: #333; margin-left: auto; z-index: 10; }
        .mobile-menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(15px);
            z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.4s ease; gap: 20px;
        }
        .mobile-menu-overlay.active { opacity: 1; pointer-events: auto; }
        .mobile-menu-overlay button {
            background: transparent; border: none; font-size: 20px; font-weight: 500; color: #333; cursor: pointer; transition: 0.3s;
        }
        .mobile-menu-overlay button:hover { color: #0177ED; }
        .mobile-menu-overlay button.logout {
            background: #000 !important; color: #fff !important; padding: 12px 30px; border-radius: 40px; margin-top: 10px;
        }
        .mobile-menu-overlay button.logout:hover { background: #ff3b30 !important; }
        .mobile-menu-overlay .close-menu { position: absolute; top: 20px; right: 30px; font-size: 40px; }

        @media (max-width: 768px) {
            .navbar { justify-content: flex-end; padding-right: 30px; overflow: visible; height: 60px;}
            .navbar img { position: absolute !important; left: 20px !important; top: 50% !important; transform: translateY(-50%) !important; }
            .navbar button:not(.hamburger) { display: none !important; }
            .hamburger { display: block; }
            
            .main-wrapper { padding: 0 15px 40px 15px; margin-top: 80px; }
            .title { font-size: 28px !important; }
            
            .calc-box { padding: 20px; }
            .headers-row, .cgpa-headers-row { display: none; /* Hide multi column headers on mobile as they squish */ }
            
            .dynamic-row, .cgpa-dynamic-row { display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid #ddd; padding-bottom: 15px; position:relative; padding-right: 35px; box-sizing: border-box; }
            .dynamic-row input, .cgpa-dynamic-row input { width: 100%; box-sizing: border-box; }
            .dynamic-row select, .cgpa-dynamic-row select { width: 100%; box-sizing: border-box; }
            .row-action { position: absolute; right: 5px; top: 5px; height: 35px; width: 35px; }
            
            .form-control { padding: 10px; font-size: 12px; }
            .buttons-bar { flex-direction: column; gap: 15px; }
            .btn { width: 100%; }
        }
    </style>
</head>

<body>
    <div id="loader">
        <div class="spinner">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>

    <nav class="navbar">
        <img src="../images/mainlogo.png" alt="" width="50"
            style="position: absolute; left: 40px; top: 50%; transform: translateY(-50%);">
        <button class="hamburger" onclick="toggleMobileMenu()">☰</button>
        <button onclick="window.location.href='/dashboard'">Home</button>
        <button onclick="showToast('This feature will be added soon.')">Orders</button>
        <button onclick="window.location.href='/cgpa_Calc'" class="cgpa_active">CGPA Calculator</button>
        <button onclick="showToast('This feature will be added soon.')">Previous Year Papers</button>
        <button onclick="window.location.href='/FFCS'">FFCS Planner</button>
        <button onclick="window.location.href='/profile'">Profile</button>
        <button class="logout" onclick="logout()">Logout</button>
    </nav>

    <div id="mainBoundary" class="main-wrapper">
        <h1 class="title">VITly GPA Calculator</h1>

        <div class="calc-box">
            <!-- Toggle UI -->
            <div class="toggle-group">
                <button class="toggle-btn active" onclick="switchTab('gpa-sect')" id="btn-gpa-sect">Semester
                    GPA</button>
                <button class="toggle-btn" onclick="switchTab('cgpa-sect')" id="btn-cgpa-sect">Cumulative CGPA</button>
            </div>

            <!-- GPA Section -->
            <div id="gpa-sect" class="calc-section active">
                <div class="headers-row">
                    <div>Course Name (Optional)</div>
                    <div>Credits</div>
                    <div>Grade</div>
                    <div style="text-align: center;">X</div>
                </div>
                <div id="gpa-rows-container">
                    <!-- Dynamic rows injected here -->
                </div>
                <div class="buttons-bar">
                    <button class="btn btn-add" onclick="addGpaRow()">+ Add Course</button>
                    <button class="btn btn-calc" onclick="calculateGPA()">Calculate SGPA</button>
                </div>
            </div>

            <!-- CGPA Section -->
            <div id="cgpa-sect" class="calc-section">
                <div class="cgpa-headers-row">
                    <div>Semester (Optional)</div>
                    <div>SGPA Scored</div>
                    <div>Total Credits</div>
                    <div style="text-align: center;">X</div>
                </div>
                <div id="cgpa-rows-container">
                    <!-- Dynamic rows injected here -->
                </div>
                <div class="buttons-bar">
                    <button class="btn btn-add" onclick="addCgpaRow()">+ Add Semester</button>
                    <button class="btn btn-calc" onclick="calculateCGPA()">Calculate CGPA</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Results Modal -->
    <div id="resultModal" class="modal-overlay">
        <div class="modal-card">
            <h2 id="modal-title" style="color: #333;">Your Calculation</h2>
            <div class="modal-score" id="modal-score">0.00</div>
            <div class="modal-subtitle" id="modal-desc">Excellent Work!</div>
            <button class="btn btn-close" onclick="closeModal()">Close & Adjust</button>
        </div>
    </div>



    <script>
        window.addEventListener("load", () => {
            setTimeout(() => {
                document.getElementById("loader").classList.add("hide");
            }, 200);

            // Initialize Default Rows
            for (let i = 0; i < 4; i++) addGpaRow();
            for (let i = 0; i < 2; i++) addCgpaRow();
        });

        function toggleMobileMenu() {
            let menu = document.getElementById('mobileMenuOverlay');
            if (!menu) {
                menu = document.createElement('div');
                menu.id = 'mobileMenuOverlay';
                menu.className = 'mobile-menu-overlay';
                let navButtons = Array.from(document.querySelectorAll('.navbar button:not(.hamburger)')).map(btn => {
                    return btn.outerHTML.replace('onclick="', 'onclick="toggleMobileMenu(); ');
                }).join('');
                menu.innerHTML = `
                    <button class="close-menu" onclick="toggleMobileMenu()">×</button>
                    ${navButtons}
                `;
                document.body.appendChild(menu);
                void menu.offsetWidth;
            }
            menu.classList.toggle('active');
        }

        function showToast(msg) {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.style.cssText = 'position: fixed; top: 80px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px;';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.innerText = msg;
            toast.style.cssText = 'background: #333; color: #fff; padding: 15px 25px; border-radius: 8px; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transform: translateX(120%); opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);';
            container.appendChild(toast);
            setTimeout(() => { toast.style.transform = 'translateX(0)'; toast.style.opacity = '1'; }, 10);
            setTimeout(() => { toast.style.transform = 'translateX(120%)'; toast.style.opacity = '0'; setTimeout(() => toast.remove(), 400); }, 2000);
        }

        function logout() {
            const modalHTML = `
            <div id="logoutModalOverlay" class="modal-overlay active" style="position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 9999; background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); opacity: 0; transition: opacity 0.3s ease;">
                <div class="modal-card" style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); text-align: center; width: 90%; max-width: 400px; transform: scale(0.9); transition: transform 0.3s ease;">
                    <h2 style="color: #333; margin-bottom: 10px;">Confirm Logout</h2>
                    <p style="color: #666; font-size: 15px; margin-bottom: 30px;">Are you sure you want to log out of VITly?</p>
                    <div style="display: flex; gap: 15px; justify-content: center;">
                        <button onclick="document.getElementById('logoutModalOverlay').remove()" style="padding: 12px 25px; border-radius: 30px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: #f1f1f1; color: #333;">Cancel</button>
                        <button onclick="window.location.href='/logout'" style="padding: 12px 25px; border-radius: 30px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: #ff3b30; color: white;">Yes, Logout</button>
                    </div>
                </div>
            </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            setTimeout(() => {
                const overlay = document.getElementById('logoutModalOverlay');
                if (overlay) {
                    overlay.style.opacity = '1';
                    overlay.querySelector('.modal-card').style.transform = 'scale(1)';
                }
            }, 10);
        }

        // Tab Switching Logic
        function switchTab(tabId) {
            document.querySelectorAll('.calc-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.toggle-btn').forEach(el => el.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
        }

        // Row Generation Elements
        const creditOptions = `
            <option value="1">1</option>
            <option value="1.5">1.5</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="20">20</option>
        `;

        const gradeOptions = `
            <option value="none">None</option>
            <option value="10">S (10)</option>
            <option value="9">A (9)</option>
            <option value="8">B (8)</option>
            <option value="7">C (7)</option>
            <option value="6">D (6)</option>
            <option value="5">E (5)</option>
            <option value="0">F (0)</option>
            <option value="0">N (0)</option>
        `;

        // SGPA Functions
        function addGpaRow() {
            const container = document.getElementById('gpa-rows-container');
            const row = document.createElement('div');
            row.className = 'dynamic-row';
            row.innerHTML = `
                <input type="text" class="form-control" placeholder="e.g. Database Systems">
                <select class="form-control credit-val">${creditOptions}</select>
                <select class="form-control grade-val">${gradeOptions}</select>
                <button class="row-action" onclick="this.parentElement.remove()">✕</button>
            `;
            container.appendChild(row);
        }

        function calculateGPA() {
            const rows = document.getElementById('gpa-rows-container').querySelectorAll('.dynamic-row');
            let totalCredits = 0;
            let totalPoints = 0;
            let consideredCourses = 0;

            rows.forEach(row => {
                const gradeStr = row.querySelector('.grade-val').value;
                const credits = parseFloat(row.querySelector('.credit-val').value);

                // Only compute if grade is not 'none'
                if (gradeStr !== "none") {
                    const gradePoint = parseFloat(gradeStr);
                    totalPoints += (gradePoint * credits);
                    totalCredits += credits;
                    consideredCourses++;
                }
            });

            if (consideredCourses === 0 || totalCredits === 0) {
                showModal("Please select a grade for at least one course to calculate SGPA.", "0.00", "Semester GPA");
                return;
            }

            const sgpa = (totalPoints / totalCredits).toFixed(2);
            showModal(`Total Selected Credits: ${totalCredits}`, sgpa, "Semester Score (SGPA)");
        }

        // CGPA Functions
        function addCgpaRow() {
            const container = document.getElementById('cgpa-rows-container');
            const row = document.createElement('div');
            row.className = 'cgpa-dynamic-row';
            // Placeholder text logic
            const count = container.children.length + 1;
            row.innerHTML = `
                <input type="text" class="form-control" placeholder="Semester ${count}">
                <input type="number" step="0.01" min="0" max="10" class="form-control sgpa-val" placeholder="e.g. 8.44">
                <input type="number" step="1" min="1" max="40" class="form-control totcredit-val" placeholder="e.g. 21">
                <button class="row-action" onclick="this.parentElement.remove()">✕</button>
            `;
            container.appendChild(row);
        }

        function calculateCGPA() {
            const rows = document.getElementById('cgpa-rows-container').querySelectorAll('.cgpa-dynamic-row');
            let totalCredits = 0;
            let totalWeightedPoints = 0;
            let validSemesters = 0;

            rows.forEach(row => {
                const sgpaStr = row.querySelector('.sgpa-val').value;
                const creditStr = row.querySelector('.totcredit-val').value;

                if (sgpaStr && creditStr) {
                    const sgpa = parseFloat(sgpaStr);
                    const creds = parseFloat(creditStr);
                    totalWeightedPoints += (sgpa * creds);
                    totalCredits += creds;
                    validSemesters++;
                }
            });

            if (validSemesters === 0 || totalCredits === 0) {
                showModal("Please enter valid SGPA and Credit combinations to compute CGPA.", "0.00", "Cumulative GPA");
                return;
            }

            const cgpa = (totalWeightedPoints / totalCredits).toFixed(2);
            showModal(`Total Completed Credits: ${totalCredits}`, cgpa, "Cumulative Score (CGPA)");
        }

        // Modal Management
        function showModal(desc, score, title) {
            document.getElementById("modal-desc").innerText = desc;
            document.getElementById("modal-score").innerText = score;
            document.getElementById("modal-title").innerText = title;

            // Activate Blur and show modal
            document.getElementById("mainBoundary").classList.add("blur-bg");
            document.getElementById("resultModal").classList.add("active");
        }

        function closeModal() {
            document.getElementById("resultModal").classList.remove("active");
            document.getElementById("mainBoundary").classList.remove("blur-bg");
        }
    </script>
</body>

</html>
