<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: 'Inter', -apple-system, sans-serif;
    }
    .page {
        width: 100%;
    }
    .hero {
        background: #111;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 56px 32px 48px;
        position: relative;
        overflow: hidden;
    }
    .hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 60% 50% at 50% 30%, rgba(212, 175, 55, 0.18) 0%, transparent 70%);
        pointer-events: none;
    }
    .logo-lockup {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        z-index: 1;
    }
    .logo-vitly {
        font-size: 3.2rem;
        font-weight: 900;
        letter-spacing: 0.18em;
        color: #d4af37;
        text-transform: uppercase;
        line-height: 1;
    }
    .logo-elite {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.55em;
        color: rgba(212, 175, 55, 0.65);
        text-transform: uppercase;
    }
    .gold-line {
        width: 60px;
        height: 2px;
        background: linear-gradient(90deg, transparent, #d4af37, transparent);
        margin: 20px auto 0;
        z-index: 1;
    }
    .section {
        background: #fff;
        padding: 56px 32px 64px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 40px;
    }
    .section-label {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        text-align: center;
    }
    .badge {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #a0803b;
        background: #fdf5e0;
        border: 1px solid #e8d08a;
        border-radius: 20px;
        padding: 5px 14px;
    }
    .section-title {
        font-size: 1.75rem;
        font-weight: 800;
        color: #111;
        letter-spacing: -0.01em;
    }
    .section-sub {
        font-size: 0.95rem;
        color: #777;
        font-weight: 400;
        max-width: 380px;
        text-align: center;
        line-height: 1.7;
    }
    .cards {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        width: 100%;
        max-width: 680px;
    }
    .card {
        background: #fff;
        border: 1px solid #eee;
        border-radius: 20px;
        padding: 32px 28px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        position: relative;
        overflow: hidden;
        transition: box-shadow 0.25s ease, transform 0.25s ease;
        cursor: default;
    }
    .card:hover {
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.09);
        transform: translateY(-4px);
    }
    .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #d4af37, #f9f295);
    }
    .card-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: #fdf5e0;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .card-icon svg {
        width: 22px;
        height: 22px;
    }
    .coming-soon {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #a0803b;
        background: #fdf5e0;
        border-radius: 6px;
        padding: 3px 8px;
        width: fit-content;
    }
    .card-title {
        font-size: 1.05rem;
        font-weight: 700;
        color: #111;
        line-height: 1.3;
    }
    .card-desc {
        font-size: 0.875rem;
        color: #555;
        line-height: 1.75;
        font-weight: 400;
    }
    .card-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 4px;
    }
    .chip {
        font-size: 11px;
        font-weight: 500;
        color: #7a5f1a;
        background: #fdf5e0;
        border: 1px solid #e8d08a;
        border-radius: 8px;
        padding: 3px 9px;
    }
    @media (max-width: 500px) {
        .cards {
            grid-template-columns: 1fr;
        }
        .logo-vitly {
            font-size: 2.4rem;
        }
    }
</style>
<div class="page">
    <div class="hero">
        <div class="logo-lockup">
            <div class="logo-vitly">VITLY</div>
            <div class="logo-elite">E L I T E</div>
        </div>
        <div class="gold-line"></div>
    </div>
    <div class="section">
        <div class="section-label">
        </div>
    </div>
</div>
