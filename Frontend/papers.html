<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previous Year Papers - Vitly</title>
    <link rel="icon" type="image/png" href="../images/mainlogo.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        button, a, img, .btn, .hamburger, .upload-btn-top, .paper-card {
            user-select: none;
            -webkit-user-drag: none;
        }
        :focus { outline: none; }
        :focus-visible { outline: 2px solid #0177ED; outline-offset: 2px; }
        html, body {
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #F5F5F7;
            color: #1d1d1f;
        }
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        .spinner {
            width: 20px;
            height: 20px;
            position: relative;
        }
        .spinner div {
            position: absolute;
            width: 3px;
            height: 10px;
            background: #fff;
            border-radius: 10px;
            top: 2px;
            left: 15px;
            transform-origin: center 16px;
            animation: fade 1.2s linear infinite;
        }
        .spinner div:nth-child(1) { transform: rotate(0deg); animation-delay: -1.1s; }
        .spinner div:nth-child(2) { transform: rotate(30deg); animation-delay: -1s; }
        .spinner div:nth-child(3) { transform: rotate(60deg); animation-delay: -0.9s; }
        .spinner div:nth-child(4) { transform: rotate(90deg); animation-delay: -0.8s; }
        .spinner div:nth-child(5) { transform: rotate(120deg); animation-delay: -0.7s; }
        .spinner div:nth-child(6) { transform: rotate(150deg); animation-delay: -0.6s; }
        .spinner div:nth-child(7) { transform: rotate(180deg); animation-delay: -0.5s; }
        .spinner div:nth-child(8) { transform: rotate(210deg); animation-delay: -0.4s; }
        .spinner div:nth-child(9) { transform: rotate(240deg); animation-delay: -0.3s; }
        .spinner div:nth-child(10) { transform: rotate(270deg); animation-delay: -0.2s; }
        .spinner div:nth-child(11) { transform: rotate(300deg); animation-delay: -0.1s; }
        .spinner div:nth-child(12) { transform: rotate(330deg); animation-delay: 0s; }
        @keyframes fade {
            0% { opacity: 1; }
            100% { opacity: 0.15; }
        }
        .hide {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }
        .navbar {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 50px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.312);
            backdrop-filter: blur(20px);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }
        .navbar button {
            background-color: transparent;
            border: none;
            color: rgb(87, 87, 87);
            cursor: pointer;
            font-family: inherit;
            font-weight: 350;
            font-size: 13px;
        }
        .logout {
            padding: 10px 20px;
            color: white !important;
            background-color: #000000 !important;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            transition: all 0.3s ease-in-out;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500 !important;
        }
        .logout:hover {
            background-color: #ff0000 !important;
        }
        .nav-active {
            color: #0071e3 !important;
            font-weight: 600 !important;
        }
        .elite-nav-btn {
            background: none !important;
            border: none !important;
            padding: 5px 10px !important;
            display: inline-flex !important;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            transition: transform 0.2s;
            overflow: visible !important;
        }
        .elite-nav-btn:hover {
            transform: scale(1.05);
        }
        .elite-logo-stack {
            position: relative;
            width: 65px;
            height: 35px;
            transform-style: preserve-3d;
        }
        .elite-logo-stack img {
            position: absolute !important;
            top: 0;
            left: 0;
            width: 100% !important;
            height: auto !important;
            transform: none !important;
            transition: none !important;
        }
        .elite-logo-stack .bg-image { z-index: 1; }
        .elite-logo-stack .top { z-index: 2; }
        @keyframes miniFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        .elite-logo-stack .floating {
            animation: miniFloat 2s ease-in-out infinite !important;
        }
        .hamburger {
            display: none;
            background: transparent;
            border: none;
            cursor: pointer;
            color: #333;
            z-index: 10;
            align-items: center;
            justify-content: center;
        }
        .hamburger svg {
            display: block;
        }
        .mobile-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.4s ease;
            gap: 20px;
        }
        .mobile-menu-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .mobile-menu-overlay button {
            background: transparent;
            border: none;
            font-size: 20px;
            font-weight: 500;
            color: #333;
            cursor: pointer;
            transition: 0.3s;
        }
        .mobile-menu-overlay button:hover {
            color: #0071e3;
        }
        .mobile-menu-overlay .close-menu {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
        }
        main {
            padding-top: 140px;
            padding-bottom: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 90%;
            max-width: 1000px;
            margin-bottom: 40px;
            position: relative;
        }
        .header-text h1 {
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #000000;
        }
        .header-text p {
            color: #86868b;
            font-size: 11px;
        }
        .upload-btn-top {
            position: absolute;
            right: 0;
            top: 10px;
            padding: 12px 25px;
            background: #000000;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 800;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-btn-top:hover {
            background: #ffffff;
            color: #000000;
        }
        .controls-container {
            width: 90%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 50px;
        }
        .search-container {
            position: relative;
            width: 100%;
        }
        .search-input {
            width: 100%;
            padding: 18px 30px;
            padding-left: 60px;
            font-size: 16px;
            border-radius: 20px;
            border: 1px solid #d2d2d7;
            background: #fff;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-input:focus {
            border-color: #0177ED;
        }
        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #86868b;
            display: flex;
            align-items: center;
        }
        .filter-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .filter-btn {
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #0177ED;
            background: rgba(255, 255, 255, 0);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            color: #0177ED;
        }
        .filter-btn.active {
            background: #000000;
            color: white;
            border: 2px solid #d2d2d7;
            border-color: #0177ED;
        }
        .papers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1000px;
        }
        .paper-card {
            background: #fff;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            border: 1px solid transparent;
        }
        .paper-card:hover {
            border-color: #0177ED;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }
        .paper-card .exam-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 5px 12px;
            background: #0177ED;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 800;
            color: white;
        }
        .paper-card .course-code {
            font-size: 13px;
            font-weight: 700;
            color: #0177ED;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .paper-card .subject-name {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.3;
            color: #1d1d1f;
        }
        .info-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .info-tag {
            font-size: 11px;
            font-weight: 700;
            color: #48484a;
            background: #f5f5f7;
            padding: 4px 10px;
            border-radius: 8px;
        }
        .paper-card .uploaded-by {
            margin-top: 10px;
            font-size: 12px;
            color: #86868b;
        }
        .view-btn {
            margin-top: auto;
            padding: 12px;
            background: #1d1d1f;
            color: #fff;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
            font-size: 14px;
        }
        .view-btn:hover {
            background: #0177ED;
        }
        #uploadModal {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #uploadModal.active {
            display: flex;
            opacity: 1;
        }
        .modal-card {
            background: #fff;
            width: 90%;
            max-width: 500px;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .modal-header h2 {
            font-size: 24px;
            font-weight: 700;
        }
        .close-modal {
            background: #f5f5f7;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #48484a;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 18px;
            border-radius: 12px;
            border: 1px solid #d2d2d7;
            outline: none;
            font-size: 15px;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: #0177ED;
        }
        .file-drop-area {
            border: 2px dashed #d2d2d7;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #0177ED;
            color: #fff;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 10001;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        @media (max-width: 768px) {
            #loader {
                background: rgba(255, 255, 255, 0.7);
                backdrop-filter: blur(20px);
            }
            .spinner div {
                background: #333;
            }
            .navbar {
                width: calc(100% - 40px);
                max-width: 450px;
                left: 50%;
                transform: translateX(-50%);
                top: 15px;
                border-radius: 50px;
                height: 60px;
                padding: 0 25px;
                justify-content: space-between;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
                border: 1px solid #fff;
                background: rgba(255, 255, 255, 0.8);
                backdrop-filter: blur(20px);
            }
            .hamburger {
                display: flex;
                margin-left: auto;
            }
            .navbar img {
                position: relative !important;
                left: 0 !important;
                top: 0 !important;
                transform: none !important;
                width: 35px;
            }
            .navbar button:not(.hamburger) {
                display: none !important;
            }
            .mobile-menu-overlay {
                top: 85px;
                right: 32px;
                left: auto;
                width: 260px;
                height: auto;
                background: rgba(255, 255, 255, 0.65);
                backdrop-filter: blur(40px);
                align-items: flex-start;
                transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                gap: 12px;
                padding: 25px 20px;
                border-radius: 25px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.1);
                border: 1px solid #fff;
                transform: translateY(-20px) scale(0.95);
            }
            .mobile-menu-overlay.active {
                transform: translateY(0) scale(1);
            }
            .mobile-menu-overlay button {
                font-size: 15px;
                white-space: nowrap;
                width: 100%;
                text-align: left;
                padding: 10px 0;
                color: #333;
                border-bottom: 1px solid rgba(0,0,0,0.05);
            }
            .mobile-menu-overlay button:last-of-type {
                border-bottom: none;
            }
            .mobile-menu-overlay .elite-nav-btn {
                padding: 10px 0 !important;
            }
            .mobile-menu-overlay .close-menu {
                display: none;
            }
            .mobile-menu-overlay button.logout {
                margin-top: 10px;
                color: #ff3b30 !important;
                background: rgba(255, 59, 48, 0.08) !important;
                padding: 14px 20px !important;
                border-radius: 14px !important;
                text-align: center !important;
                font-weight: 600 !important;
                border-bottom: none;
            }
            .mobile-menu-overlay button.logout:hover {
                background: rgba(255, 59, 48, 0.15) !important;
            }
            .header-section {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
            .upload-btn-top {
                position: static;
                width: 100%;
                margin-top: 10px;
            }
            .filter-tabs {
                flex-wrap: wrap;
            }
        }
        @media (max-width: 1024px) {
            .papers-grid {
                grid-template-columns: repeat(2, 1fr);
                width: 95%;
            }
        }
        @media (max-width: 768px) {
            .navbar {
                width: calc(100% - 40px);
                max-width: 450px;
                left: 50%;
                transform: translateX(-50%);
                top: 15px;
                border-radius: 50px;
                height: 60px;
                padding: 0 25px;
                justify-content: space-between;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
                border: 1px solid #fff;
                background: rgba(255, 255, 255, 0.8);
                backdrop-filter: blur(20px);
            }
            .navbar img {
                position: relative !important;
                left: 0 !important;
                top: 0 !important;
                transform: none !important;
                width: 50px;
            }
            .navbar button:not(.hamburger) {
                display: none !important;
            }
            .hamburger {
                display: flex;
            }
            main {
                padding-top: 110px;
                padding-bottom: 40px;
            }
            .header-section {
                width: 95%;
                margin-bottom: 25px;
                gap: 15px;
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .header-text {
                width: 100%;
                text-align: center;
            }
            .header-text h1 {
                font-size: 32px;
                letter-spacing: -0.5px;
                margin-bottom: 5px;
            }
            .header-text p {
                font-size: 13px;
                margin-bottom: 10px;
            }
            .upload-btn-top {
                position: static;
                width: 100%;
                max-width: none;
                padding: 15px;
                font-size: 14px;
            }
            .controls-container {
                width: 95%;
                gap: 15px;
                margin-bottom: 30px;
            }
            .search-input {
                padding: 15px 20px 15px 50px;
                font-size: 15px;
            }
            .search-icon {
                left: 15px;
            }
            .filter-tabs {
                justify-content: flex-start;
                overflow-x: auto;
                padding: 5px 0 10px 0;
                -webkit-overflow-scrolling: touch;
                width: 100%;
                scrollbar-width: none;
            }
            .filter-tabs::-webkit-scrollbar {
                display: none;
            }
            .filter-btn {
                white-space: nowrap;
                padding: 8px 18px;
            }
            .papers-grid {
                grid-template-columns: 1fr;
                gap: 16px;
                width: 95%;
            }
            .paper-card {
                padding: 20px;
            }
            .paper-card .course-code {
                font-size: 18px;
            }
            .paper-card .subject-name {
                font-size: 14px;
                line-height: 1.4;
            }
            .modal-card {
                padding: 30px 20px;
                width: 95%;
                border-radius: 20px;
            }
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
        .elite-nav-btn {
            background: none !important;
            border: none !important;
            padding: 5px 10px !important;
            display: inline-flex !important;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            transition: transform 0.2s;
            overflow: visible !important;
        }
        .elite-nav-btn:hover {
            transform: scale(1.05);
        }
        .elite-nav-btn:focus, .elite-nav-btn:active, .elite-nav-btn:focus-visible {
            outline: none !important;
            box-shadow: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }
        .elite-logo-stack {
            position: relative;
            width: 65px;
            height: 35px;
            transform-style: preserve-3d;
        }
        .elite-logo-stack img {
            position: absolute !important;
            top: 0;
            left: 0;
            width: 100% !important;
            height: auto !important;
            transform: none !important;
            transition: none !important;
        }
        .elite-logo-stack .bg-image { z-index: 1; }
        .elite-logo-stack .top { z-index: 2; }
        @keyframes miniFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        .elite-logo-stack .floating {
            animation: miniFloat 2s ease-in-out infinite !important;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner">
            <div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div>
        </div>
    </div>
    <nav class="navbar">
        <img src="../images/vitly-new-logo.png" alt="" width="50" onclick="window.location.href='/dashboard'"
            style="position: absolute; left: 40px; top: 50%; transform: translateY(-50%); cursor: pointer;">
        <button class="hamburger" onclick="toggleMobileMenu()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <button onclick="window.location.href='/dashboard'">Home</button>
        <button class="elite-nav-btn" onclick="window.location.href='/elite'">
            <div class="elite-logo-stack">
                <img src="../images/ELITE.png" alt="" class="top">
                <img src="../images/VITL.png" alt="" class="bg-image">
                <img src="../images/FLASHLOGO.png" alt="" class="top floating">
            </div>
        </button>
        <button onclick="window.location.href='/cgpa_Calc'">CGPA Calculator</button>
        <button onclick="window.location.href='/papers'" class="nav-active">Previous Year Papers</button>
        <button onclick="window.location.href='/FFCS'">FFCS Planner</button>
        <button onclick="window.location.href='/profile'">Profile</button>
        <button id="nav-auth-btn" class="logout" onclick="handleAuthAction()">Logout</button>
    </nav>
    <main>
        <div class="header-section">
            <div class="header-text">
                <h1>Previous Year Papers</h1>
                <p>Non repeated papers for good practice.</p>
            </div>
            <button class="upload-btn-top" onclick="openUploadModal()">Upload a Paper</button>
        </div>
        <div class="controls-container">
            <div class="search-container">
                <span class="search-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </span>
                <input type="text" class="search-input" id="paperSearch"
                    placeholder="Search by course code or subject..." onkeyup="applyFilters()">
            </div>
            <div class="filter-tabs">
                <button class="filter-btn active" onclick="setExamFilter('All', this)">All</button>
                <button class="filter-btn" onclick="setExamFilter('CAT1', this)">CAT 1</button>
                <button class="filter-btn" onclick="setExamFilter('CAT2', this)">CAT 2</button>
                <button class="filter-btn" onclick="setExamFilter('FAT', this)">FAT</button>
            </div>
        </div>
        <div class="papers-grid" id="papersGrid">
        </div>
    </main>
    <div id="uploadModal">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Upload Paper</h2>
                <button class="close-modal" onclick="toggleUploadModal(false)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <form id="uploadForm" onsubmit="handleUpload(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="courseCode">Course Code</label>
                        <input type="text" id="courseCode" placeholder="e.g. CSE1001" required>
                    </div>
                    <div class="form-group">
                        <label for="slot">Slot</label>
                        <input type="text" id="slot" placeholder="e.g. A1" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="examType">Exam Type</label>
                        <select id="examType" required>
                            <option value="CAT1">CAT 1</option>
                            <option value="CAT2">CAT 2</option>
                            <option value="FAT">FAT</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="year">Year</label>
                        <input type="text" id="year" placeholder="e.g. 2025-2026" required pattern="\d{4}-\d{4}">
                    </div>
                </div>
                <div class="form-group">
                    <label for="subject">Subject Name</label>
                    <input type="text" id="subject" placeholder="e.g. Calculus" required>
                </div>
                <div class="file-drop-area" onclick="document.getElementById('fileInput').click()">
                    <p id="fileName">Click to upload Images or PDF</p>
                    <input type="file" id="fileInput" hidden multiple accept="image/*,.pdf"
                        onchange="handleFileSelect(event)">
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="showName" checked>
                    <label for="showName">Display my name on upload</label>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Upload Paper</button>
            </form>
        </div>
    </div>
    <div id="toast" class="toast"></div>
    <script>
        let allPapers = [];
        let selectedFiles = [];
        let currentExamFilter = 'All';
        async function fetchPapers() {
            try {
                const response = await fetch('/api/papers');
                allPapers = await response.json();
                applyFilters();
            } catch (error) {
                console.error("Failed to fetch papers:", error);
            } finally {
                document.getElementById('loader').classList.add('hide');
            }
        }
        function renderPapers(papers) {
            const grid = document.getElementById('papersGrid');
            grid.innerHTML = papers.map(paper => `
                <div class="paper-card">
                    <span class="exam-badge">${paper.examType}</span>
                    <div class="course-code">${paper.courseCode}</div>
                    <div class="subject-name">${paper.subject}</div>
                    <div class="info-row">
                        <span class="info-tag">Year: ${paper.year}</span>
                        <span class="info-tag">Slot: ${paper.slot}</span>
                    </div>
                    <div class="uploaded-by">By: ${paper.uploadedBy}</div>
                    <a href="/paper-preview?courseCode=${encodeURIComponent(paper.courseCode)}&subject=${encodeURIComponent(paper.subject)}&year=${encodeURIComponent(paper.year)}&slot=${encodeURIComponent(paper.slot)}&examType=${encodeURIComponent(paper.examType)}" class="view-btn">View Paper</a>
                </div>
            `).join('');
            if (papers.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #86868b; padding: 40px;">No papers found.</div>';
            }
        }
        function setExamFilter(filter, btn) {
            currentExamFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyFilters();
        }
        function applyFilters() {
            const query = document.getElementById('paperSearch').value.toLowerCase();
            let filtered = allPapers;
            if (currentExamFilter !== 'All') {
                filtered = filtered.filter(p => p.examType === currentExamFilter);
            }
            if (query) {
                filtered = filtered.filter(p =>
                    p.courseCode.toLowerCase().includes(query) ||
                    p.subject.toLowerCase().includes(query)
                );
            }
            renderPapers(filtered);
        }
        function toggleUploadModal(show) {
            const modal = document.getElementById('uploadModal');
            if (show) {
                modal.style.display = 'flex';
                setTimeout(() => modal.classList.add('active'), 10);
            } else {
                modal.classList.remove('active');
                setTimeout(() => modal.style.display = 'none', 300);
            }
        }
        function handleFileSelect(event) {
            selectedFiles = Array.from(event.target.files);
            const fileNameDisplay = document.getElementById('fileName');
            if (selectedFiles.length > 0) {
                fileNameDisplay.innerText = selectedFiles.length === 1 ? selectedFiles[0].name : `${selectedFiles.length} files selected`;
                fileNameDisplay.style.color = '#0177ED';
            } else {
                fileNameDisplay.innerText = 'Click to upload Images or PDF';
                fileNameDisplay.style.color = '#86868b';
            }
        }
        async function handleUpload(event) {
            event.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";
            const courseCode = document.getElementById('courseCode').value;
            const subject = document.getElementById('subject').value;
            const year = document.getElementById('year').value;
            const slot = document.getElementById('slot').value;
            const examType = document.getElementById('examType').value;
            const showName = document.getElementById('showName').checked;
            if (selectedFiles.length === 0) {
                showToast("Please select a file.");
                submitBtn.disabled = false;
                submitBtn.innerText = "Upload Paper";
                return;
            }
            try {
                let finalFileData = "";
                const firstFile = selectedFiles[0];
                if (firstFile.type === "application/pdf" && selectedFiles.length === 1) {
                    finalFileData = await fileToBase64(firstFile);
                } else {
                    showToast("Converting to PDF...");
                    finalFileData = await convertImagesToPdf(selectedFiles);
                }
                const response = await fetch('/api/upload-paper', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ courseCode, subject, year, slot, examType, showName, fileData: finalFileData })
                });
                const result = await response.json();
                if (response.ok) {
                    showToast("Uploaded successfully!");
                    toggleUploadModal(false);
                    document.getElementById('uploadForm').reset();
                    document.getElementById('fileName').innerText = 'Click to upload Images or PDF';
                    fetchPapers();
                } else {
                    showToast(result.error || "Upload failed.");
                }
            } catch (error) {
                showToast("An error occurred.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Upload Paper";
            }
        }
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }
        async function convertImagesToPdf(files) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            for (let i = 0; i < files.length; i++) {
                if (!files[i].type.startsWith('image/')) continue;
                const imgData = await fileToBase64(files[i]);
                if (i > 0) doc.addPage();
                const img = new Image();
                img.src = imgData;
                await new Promise(res => img.onload = res);
                const pw = doc.internal.pageSize.getWidth();
                const ph = doc.internal.pageSize.getHeight();
                const m = 10;
                let w = img.width, h = img.height;
                const r = w / h;
                if (w > pw - 2 * m) { w = pw - 2 * m; h = w / r; }
                if (h > ph - 2 * m) { h = ph - 2 * m; w = h * r; }
                doc.addImage(imgData, 'JPEG', m, m, w, h);
            }
            return doc.output('datauristring');
        }
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        function logout() {
            const modalHTML = `
            <div id="logoutModalOverlay" class="modal-overlay active" style="position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 9999; background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); opacity: 0; transition: opacity 0.3s ease;">
                <div class="modal-card" style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); text-align: center; width: 90%; max-width: 400px; transform: scale(0.9); transition: transform 0.3s ease;">
                    <h2 style="color: #333; margin-bottom: 10px;">Confirm Logout</h2>
                    <p style="color: #666; font-size: 15px; margin-bottom: 30px;">Are you sure you want to log out of VITly?</p>
                    <div style="display: flex; gap: 15px; justify-content: center;">
                        <button onclick="document.getElementById('logoutModalOverlay').remove()" style="padding: 12px 25px; border-radius: 30px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: #f1f1f1; color: #333;">Cancel</button>
                        <button onclick="window.location.href='/logout'" style="padding: 12px 25px; border-radius: 30px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: #ff3b30; color: white;">Yes, Logout</button>
                    </div>
                </div>
            </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            setTimeout(() => {
                const overlay = document.getElementById('logoutModalOverlay');
                if (overlay) {
                    overlay.style.opacity = '1';
                    overlay.querySelector('.modal-card').style.transform = 'scale(1)';
                }
            }, 10);
        }
        async function checkAuth() {
            try {
                const res = await fetch('/api/user');
                const user = await res.json();
                window.currentUser = user;
                const authBtn = document.getElementById('nav-auth-btn');
                if (user.authenticated) {
                    authBtn.textContent = 'Logout';
                    authBtn.classList.remove('login-btn');
                    authBtn.onclick = logout;
                } else {
                    authBtn.textContent = 'Login';
                    authBtn.classList.add('login-btn');
                    authBtn.onclick = () => window.location.href = '/login';
                }
            } catch (err) {
                console.error("Auth check failed:", err);
            }
        }
        function openUploadModal() {
            if (!window.currentUser || !window.currentUser.authenticated) {
                window.location.href = '/login';
                return;
            }
            const modal = document.getElementById('uploadModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }
        function toggleMobileMenu() {
            let menu = document.getElementById('mobileMenuOverlay');
            if (!menu) {
                menu = document.createElement('div');
                menu.id = 'mobileMenuOverlay';
                menu.className = 'mobile-menu-overlay';
                let navButtons = Array.from(document.querySelectorAll('.navbar button:not(.hamburger)')).map(btn => {
                    return btn.outerHTML.replace('onclick="', 'onclick="toggleMobileMenu(); ');
                }).join('');
                menu.innerHTML = `
                    <button class="close-menu" onclick="toggleMobileMenu()">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                    ${navButtons}
                `;
                document.body.appendChild(menu);
                void menu.offsetWidth;
            }
            menu.classList.toggle('active');
        }
        window.onload = () => {
            fetchPapers();
            checkAuth();
        };
    </script>
</body>
</html>
