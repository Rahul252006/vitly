<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITLY Elite - Upcoming Features</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: #ffffff;

            color: #111;
            overflow-x: hidden;
        }

        .whole-logo {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
        }

        .elite-logo {
            position: relative;
            width: 600px;
            height: 400px;
            margin-bottom: -50px;
        }

        .elite-logo img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
        }

        .bg-image {
            z-index: 1;
        }

        .top {
            z-index: 2;
        }

        .container h2 {
            font-size: 20px;
            font-weight: 2000;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="whole-logo">
        <div class="elite-logo">
            <img src="../images/ELITE.png" alt="" class="top">
            <img src="../images/VITL.png" alt="" class="bg-image">
            <img src="../images/FLASHLOGO.png" alt="" class="top floating">
        </div>
        <div class="container">
            <h2>Will be coming soon...With Added Features!</h2>
        </div>
    </div>


</body>

</html>
